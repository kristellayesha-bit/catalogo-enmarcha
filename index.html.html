<style>
:root{--bg:#0d0f14;--panel:#161a22;--panel2:#1e2330;--line:#2b3242;--text:#eef1fb;--muted:#8791ad;--purple:#8829da;--navy:#110247;--gold:#e8b84b;--blue:#3d7fff;--green:#34d399;--orange:#f97316;--danger:#fb7185;--white:#ffffff;}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:.01em} button,input,select{font-family:inherit} .app{display:grid;grid-template-columns:285px 1fr;min-height:100vh} .sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,#171a29 0%,#10131d 100%);border-right:1px solid var(--line);padding:18px 16px;overflow:auto} .logoBox{height:76px;display:flex;align-items:center;margin-bottom:18px} .logoBox img{max-width:210px;max-height:70px;object-fit:contain} .filterTitle{font-family:'Syne';font-size:11px;color:#c8d0e5;text-transform:uppercase;letter-spacing:.16em;margin:17px 0 7px} .field select,.field input{width:100%;background:#11151f;border:1px solid #353c50;color:#f2f4fb;border-radius:10px;padding:10px 11px;outline:none;font-size:12px} .field input[type=range]{padding:0;accent-color:var(--purple)} .clearBtn,.uploadLabel{width:100%;margin-top:16px;background:#20162e;border:1px solid rgba(136,41,218,.45);color:#fff;border-radius:12px;padding:11px;font-weight:700;cursor:pointer} .uploadLabel{display:block;text-align:center;color:#d7c6ff} .hint{color:var(--muted);font-size:11px;line-height:1.4;margin-top:8px}
.main{min-width:0} .topbar{position:sticky;top:0;z-index:20;background:rgba(13,15,20,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;gap:14px;align-items:center;justify-content:space-between} .title{display:flex;flex-direction:column;gap:3px} h1{font-family:'Syne';font-size:20px;margin:0;letter-spacing:.02em} .count{color:var(--muted);font-size:12px} .count b{color:#fff} .searchWrap{flex:1;max-width:560px} .searchWrap input{width:100%;background:#11151f;border:1px solid #30384a;border-radius:13px;padding:12px 14px;color:white} .controls{display:flex;gap:8px;align-items:center} .controls select,.viewBtn{height:40px;background:var(--panel2);border:1px solid #30384a;color:#fff;border-radius:11px;padding:0 12px;font-weight:700;cursor:pointer} .viewBtn.active{background:var(--gold);color:#18110a;border-color:var(--gold)} .content{padding:18px 20px 30px} .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px} .card{position:relative;background:var(--panel);border:1px solid #293146;border-radius:17px;padding:18px 18px 16px;cursor:pointer;transition:.22s ease;overflow:hidden;min-height:205px} .card:before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--blue),var(--gold));opacity:0;transition:.22s} .card:hover{transform:translateY(-5px);border-color:#44506a;box-shadow:0 18px 35px rgba(0,0,0,.32)} .card:hover:before{opacity:1} .cardTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start} .code{color:var(--muted);font-size:11px;font-weight:700} .badge{border-radius:999px;padding:5px 10px;font-size:11px;font-weight:800;white-space:nowrap} .disponible{background:rgba(52,211,153,.14);color:var(--green)} .separado{background:rgba(249,115,22,.15);color:var(--orange)} .vendido,.no-disponible{background:rgba(251,113,133,.16);color:var(--danger)} .other{background:rgba(61,127,255,.14);color:#8bb3ff} .project{font-family:'Syne';font-size:20px;margin:18px 0 6px} .addr{color:var(--muted);line-height:1.35;min-height:36px} .tag{display:inline-flex;margin-top:10px;border:1px solid rgba(61,127,255,.45);background:rgba(61,127,255,.10);color:#71a2ff;border-radius:8px;padding:5px 9px;font-size:12px} .price{font-family:'Syne';font-size:30px;color:var(--gold);font-weight:800;margin:16px 0} .cardFoot{border-top:1px solid #293146;padding-top:12px;display:flex;justify-content:space-between;gap:12px;color:var(--muted)} .commission b{color:var(--green)}
.tableWrap{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:auto} table{width:100%;border-collapse:collapse;min-width:1060px} th,td{padding:13px 14px;border-bottom:1px solid #252c3b;text-align:left;white-space:nowrap} th{font-family:'Syne';font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#9ca7c4;background:#141923;position:sticky;top:0} td{color:#dbe1f2} tr{cursor:pointer} tr:hover{background:#1b2130}
#map{height:calc(100vh - 168px);min-height:540px;border-radius:18px;border:1px solid var(--line);background:var(--panel);overflow:hidden} .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#161a22;color:#eef1fb;border:1px solid #2b3242} .leaflet-container{font-family:'DM Sans',sans-serif} .mapPopup h3{margin:0 0 6px;font-family:'Syne';font-size:16px} .mapPopup p{margin:3px 0;color:#9aa5c1} .mapPopup button{margin-top:8px;background:var(--purple);color:#fff;border:0;border-radius:8px;padding:8px 10px;font-weight:700;cursor:pointer}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:18px} .pageBtn{background:var(--panel2);border:1px solid #30384a;color:#fff;border-radius:10px;padding:9px 12px;cursor:pointer} .pageBtn:disabled{opacity:.35;cursor:not-allowed}
.modalBack{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:center;justify-content:center;padding:28px} .modal{width:min(880px,96vw);max-height:92vh;overflow:auto;background:#171b24;border:1px solid #30384a;border-radius:18px;box-shadow:0 35px 80px rgba(0,0,0,.55)} .modalHead{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:18px;align-items:flex-start} .modal h2{font-family:'Syne';font-size:34px;margin:7px 0 4px;line-height:1} .close{background:#202638;border:1px solid #384157;color:#8f99b6;width:42px;height:42px;border-radius:12px;font-size:26px;cursor:pointer} .modalBody{padding:20px 24px 24px} .sectionTitle{font-family:'Syne';font-size:13px;text-transform:uppercase;letter-spacing:.16em;color:#8f99b6;border-bottom:1px solid #30384a;padding-bottom:10px;margin:6px 0 13px} .detailGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px 24px;margin-bottom:20px} .detail .label{font-size:11px;text-transform:uppercase;letter-spacing:.13em;color:#7d88a6;margin-bottom:4px} .detail .value{font-size:15px;font-weight:700;color:#e9edf8} .modalPrice{font-family:'Syne';font-size:44px;color:var(--gold);font-weight:800;margin:12px 0 18px} .commissionBox{display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.27);border-radius:14px;padding:15px 18px;margin-top:15px} .commissionBox span{color:#91a0bd} .commissionBox b{font-family:'Syne';font-size:30px;color:var(--green)} .linkRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px} .linkBtn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;background:#20162e;border:1px solid rgba(136,41,218,.5);color:#fff;border-radius:12px;padding:11px 14px;font-weight:800} .linkBtn.secondary{background:#111827;border-color:rgba(61,127,255,.45);color:#bcd2ff} .imgPreview{margin-top:14px;border:1px solid #30384a;border-radius:14px;overflow:hidden;background:#0f1219;max-height:300px;display:none} .imgPreview img{width:100%;height:auto;display:block;object-fit:cover}
.hidden{display:none!important} @media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.grid{grid-template-columns:repeat(2,1fr)}.topbar{flex-wrap:wrap}} @media(max-width:720px){.grid{grid-template-columns:1fr}.detailGrid{grid-template-columns:1fr}.modal h2{font-size:28px}}
</style>

const PAGE_SIZE=24; let state={view:'grid',page:1,filtered:[],map:null,markers:[]};
const $=id=>document.getElementById(id); const money=n=>{n=Number(n); return isFinite(n)?'S/ '+n.toLocaleString('es-PE',{maximumFractionDigits:n%1?2:0}):'—'};
const txt=v=>(v===null||v===undefined||v==='')?'—':String(v); const norm=v=>String(v??'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
const badgeClass=s=>{let x=norm(s); if(x.includes('disponible'))return'disponible'; if(x.includes('separ'))return'separado'; if(x.includes('vend'))return'vendido'; if(x.includes('no'))return'no-disponible'; return'other'};
function unique(key){return [...new Set(DATA.map(d=>txt(d[key])).filter(v=>v&&v!=='—'))].sort((a,b)=>String(a).localeCompare(String(b),'es'));}
function fillSelect(id,key,label='Todas'){const el=$(id); const cur=el.value; el.innerHTML=`<option value="">${label}</option>`+unique(key).map(v=>`<option>${v}</option>`).join(''); if([...el.options].some(o=>o.value===cur))el.value=cur;}
function initFilters(){[['fEstado','estado'],['fProyecto','proyecto'],['fDistrito','distrito'],['fTipo','tipo'],['fSubtipo','subtipo'],['fDorms','dorms'],['fEtapa','etapa'],['fContrato','contrato'],['fVista','vista']].forEach(x=>fillSelect(x[0],x[1])); let max=Math.max(0,...DATA.map(d=>Number(d.precio_sol)||0)); $('fPrecio').max=Math.ceil(max/1000)*1000; $('fPrecio').value=$('fPrecio').max; $('priceLabel').textContent=money($('fPrecio').value);}
function applyFilters(){let q=norm($('search').value), max=Number($('fPrecio').value)||Infinity; $('priceLabel').textContent=money(max); let filters={estado:$('fEstado').value,proyecto:$('fProyecto').value,distrito:$('fDistrito').value,tipo:$('fTipo').value,subtipo:$('fSubtipo').value,dorms:$('fDorms').value,etapa:$('fEtapa').value,contrato:$('fContrato').value,vista:$('fVista').value}; let arr=DATA.filter(d=>{let ok=Object.entries(filters).every(([k,v])=>!v||String(d[k])===v); if(!ok)return false; if((Number(d.precio_sol)||0)>max)return false; if(q){let hay=['codigo','proyecto','distrito','direccion','agente'].some(k=>norm(d[k]).includes(q)); if(!hay)return false;} return true;}); let sort=$('sort').value; arr.sort((a,b)=>{if(sort==='precioAsc')return (Number(a.precio_sol)||0)-(Number(b.precio_sol)||0); if(sort==='precioDesc')return (Number(b.precio_sol)||0)-(Number(a.precio_sol)||0); if(sort==='comisionDesc')return (Number(b.comision_sol)||0)-(Number(a.comision_sol)||0); if(sort==='distrito')return txt(a.distrito).localeCompare(txt(b.distrito),'es'); return txt(a.codigo).localeCompare(txt(b.codigo),'es');}); state.filtered=arr; $('shownCount').textContent=arr.length; $('totalCount').textContent=DATA.length; let pages=Math.max(1,Math.ceil(arr.length/PAGE_SIZE)); if(state.page>pages)state.page=1; render();}
function card(d,i){return `<article class="card" onclick="openModal(${i})"><div class="cardTop"><div class="code">${txt(d.codigo)}</div><span class="badge ${badgeClass(d.estado)}">${txt(d.estado)}</span></div><div class="project">${txt(d.proyecto)}</div><div class="addr">${txt(d.direccion)}</div><span class="tag">${txt(d.etapa)}</span><div class="price">${money(d.precio_sol)}</div><div class="cardFoot"><span>${txt(d.contrato)}</span><span class="commission">Comisión: <b>${money(d.comision_sol)}</b></span></div></article>`}
function renderGrid(){let start=(state.page-1)*PAGE_SIZE; $('gridView').innerHTML=state.filtered.slice(start,start+PAGE_SIZE).map((d,idx)=>card(d,start+idx)).join('')||'<div class="hint">No se encontraron inmuebles.</div>';}
function renderTable(){let start=(state.page-1)*PAGE_SIZE; let rows=state.filtered.slice(start,start+PAGE_SIZE).map((d,idx)=>`<tr onclick="openModal(${start+idx})"><td><span class="badge ${badgeClass(d.estado)}">${txt(d.estado)}</span></td><td>${txt(d.codigo)}</td><td>${txt(d.proyecto)}</td><td>${txt(d.distrito)}</td><td>${txt(d.tipo)}</td><td>${txt(d.subtipo)}</td><td>${txt(d.vista)}</td><td>${money(d.precio_sol)}</td><td>${money(d.comision_sol)}</td><td>${txt(d.agente)}</td></tr>`).join(''); $('tableView').innerHTML=`<table><thead><tr><th>Estado</th><th>Código</th><th>Proyecto</th><th>Distrito</th><th>Tipo</th><th>Subtipo</th><th>Vista</th><th>Precio</th><th>Comisión</th><th>Agente</th></tr></thead><tbody>${rows}</tbody></table>`;}
function renderPagination(){let pages=Math.max(1,Math.ceil(state.filtered.length/PAGE_SIZE)); $('pagination').classList.toggle('hidden',state.view==='map'); $('pagination').innerHTML=`<button class="pageBtn" ${state.page<=1?'disabled':''} onclick="state.page--;render()">Anterior</button><span class="hint">Página ${state.page} de ${pages}</span><button class="pageBtn" ${state.page>=pages?'disabled':''} onclick="state.page++;render()">Siguiente</button>`;}
function renderMap(){setTimeout(()=>{if(!state.map){state.map=L.map('map',{scrollWheelZoom:true}).setView([-12.08,-77.04],11); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(state.map);} state.markers.forEach(m=>m.remove()); state.markers=[]; let bounds=[]; state.filtered.forEach((d,i)=>{let lat=Number(d.lat),lng=Number(d.lng); if(!isFinite(lat)||!isFinite(lng))return; let color=badgeClass(d.estado)==='disponible'?'#34d399':(badgeClass(d.estado)==='separado'?'#f97316':'#8829da'); let m=L.circleMarker([lat,lng],{radius:7,color,fillColor:color,fillOpacity:.82,weight:2}).addTo(state.map); m.bindPopup(`<div class="mapPopup"><h3>${txt(d.proyecto)}</h3><p>${txt(d.codigo)} · ${txt(d.distrito)}</p><p><b>${money(d.precio_sol)}</b></p><button onclick="openModal(${i})">Ver detalle</button></div>`); state.markers.push(m); bounds.push([lat,lng]);}); if(bounds.length)state.map.fitBounds(bounds,{padding:[30,30],maxZoom:15}); state.map.invalidateSize();},50)}
function render(){$('gridView').classList.toggle('hidden',state.view!=='grid'); $('tableView').classList.toggle('hidden',state.view!=='table'); $('mapView').classList.toggle('hidden',state.view!=='map'); if(state.view==='grid')renderGrid(); if(state.view==='table')renderTable(); if(state.view==='map')renderMap(); renderPagination();}
function openModal(i){let d=state.filtered[i]; if(!d)return; $('modalMeta').innerHTML=`<span class="badge ${badgeClass(d.estado)}">${txt(d.estado)}</span> <span class="code" style="margin-left:10px">${txt(d.codigo)}</span>`; $('modalTitle').textContent=txt(d.proyecto); $('modalSubtitle').textContent='Proyecto: '+txt(d.proyecto); let img=(d.fachada_plano&&/^https?:\/\/.+\.(jpg|jpeg|png|webp)(\?.*)?$/i.test(d.fachada_plano))?`<div class="imgPreview" style="display:block"><img src="${d.fachada_plano}" onerror="this.parentElement.style.display='none'"></div>`:''; $('modalBody').innerHTML=`<div class="sectionTitle">Ubicación</div><div class="detail"><div class="value">${txt(d.direccion)}</div><span class="tag">${txt(d.distrito)}</span></div><div class="sectionTitle" style="margin-top:22px">Precio</div><div class="modalPrice">${money(d.precio_sol)}</div><div class="detailGrid"><div class="detail"><div class="label">Tipo</div><div class="value">${txt(d.tipo)}</div></div><div class="detail"><div class="label">Subtipo</div><div class="value">${txt(d.subtipo)}</div></div><div class="detail"><div class="label">Unidad</div><div class="value">${txt(d.unidad)}</div></div><div class="detail"><div class="label">Dormitorios</div><div class="value">${txt(d.dorms)}</div></div><div class="detail"><div class="label">Metraje</div><div class="value">${txt(d.metraje)} m²</div></div><div class="detail"><div class="label">Vista</div><div class="value">${txt(d.vista)}</div></div><div class="detail"><div class="label">Etapa</div><div class="value">${txt(d.etapa)}</div></div><div class="detail"><div class="label">Entrega</div><div class="value">${txt(d.entrega)}</div></div><div class="detail"><div class="label">Contrato</div><div class="value">${txt(d.contrato)}</div></div><div class="detail"><div class="label">Tipología</div><div class="value">${txt(d.tipologia)}</div></div><div class="detail"><div class="label">Agente captador</div><div class="value">${txt(d.agente)}</div></div><div class="detail"><div class="label">Contacto</div><div class="value">${txt(d.contacto)} · ${txt(d.celular)}</div></div></div><div class="sectionTitle">Archivos</div><div class="linkRow">${d.fachada_plano?`<a class="linkBtn" href="${d.fachada_plano}" target="_blank">Abrir fachada/plano</a>`:''}${d.carpeta?`<a class="linkBtn secondary" href="${d.carpeta}" target="_blank">Abrir carpeta</a>`:''}</div>${img}<div class="commissionBox"><span>Comisión asociado (S/)</span><b>${money(d.comision_sol)}</b></div>`; $('modalBack').style.display='flex';}
function closeModal(){$('modalBack').style.display='none'}
function wire(){['fEstado','fDistrito','fTipo','fSubtipo','fDorms','fEtapa','fContrato','fVista','fPrecio','search','sort'].forEach(id=>$(id).addEventListener('input',()=>{state.page=1;applyFilters();})); $('clearFilters').onclick=()=>{['fEstado','fDistrito','fTipo','fSubtipo','fDorms','fEtapa','fContrato','fVista','search'].forEach(id=>$(id).value=''); $('fPrecio').value=$('fPrecio').max; state.page=1;applyFilters();}; document.querySelectorAll('.viewBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.viewBtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); state.view=b.dataset.view; render();}); $('closeModal').onclick=closeModal; $('modalBack').onclick=e=>{if(e.target.id==='modalBack')closeModal();};}
function handleExcel(e){const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=ev=>{const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'}); const ws=wb.Sheets['CAPTACIONES']||wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{defval:''}); DATA=rows.map(r=>{const g=h=>r[h]??''; let coord=String(g('COORDENADAS')||''); let nums=coord.match(/-?\d+(?:[\.,]\d+)?/g)||[]; let lat=null,lng=null; if(nums.length>=2){lat=parseFloat(nums[0].replace(',','.'));lng=parseFloat(nums[1].replace(',','.')); if(Math.abs(lat)>30&&Math.abs(lng)<30){let t=lat;lat=lng;lng=t;}} return {codigo:g('CÓDIGO'),estado:g('ESTADO'),tipo:g('TIPO DE INMUEBLE'),proyecto:g('PROYECTO'),distrito:g('DISTRITO'),subtipo:g('SUBTIPO DE UNIDAD'),unidad:g('UNIDAD'),tipologia:g('TIPOLOGÍA'),dorms:g('DORMITORIOS'),metraje:g('METRAJE (m2)'),vista:g('VISTA'),precio_usd:g('PRECIO ($)'),precio_sol:Number(g('PRECIO (S/)'))||0,etapa:g('ETAPA'),entrega:g('FECHA DE ENTREGA'),contrato:g('TIPO DE CONTRATO'),comision_sol:Number(g('S/. COMISIÓN ASOCIADO'))||0,agente:g('AGENTE CAPTADOR'),contacto:g('PERSONA DE CONTACTO'),celular:g('CELULAR'),correo:g('CORREO'),direccion:g('DIRECCIÓN'),descuento:g('DESCUENTO'),coordenadas:coord,fachada_plano:g('FACHADA O PLANO'),carpeta:g('CARPETA'),lat,lng};}).filter(d=>d.codigo||d.proyecto||d.direccion); initFilters(); state.page=1; applyFilters(); alert('Base actualizada temporalmente en esta vista.');}; reader.readAsArrayBuffer(file);}
initFilters(); wire(); applyFilters();
</script></body></html>
